table_name: nhc_advisory_forecast_track
main_dttm_col: null
description: NHC hurricane advisory forecast track lines connecting consecutive forecast
  points
default_endpoint: null
offset: 0
cache_timeout: null
catalog: null
schema: public
sql: "SELECT\n    storm_name,\n    nhc_identifier,\n    ST_AsGeoJSON(ST_MakeLine(\"\
  start_geom\", \"end_geom\"))::text AS geom,\n    wind_speed_mph,\n    max_gust_mph,\n\
  \    year\nFROM (\n    SELECT\n        storm_name,\n        nhc_identifier,\n  \
  \      ST_GeomFromGeoJSON(forecast_point) AS \"start_geom\",\n        LEAD(ST_GeomFromGeoJSON(forecast_point))\
  \ OVER (\n            PARTITION BY storm_name ORDER BY nhc_identifier\n        )\
  \ AS \"end_geom\",\n        wind_speed_mph,\n        max_gust_mph,\n        year\n\
  \    FROM nhc_advisory_forecast_track\n) sub\nWHERE \"end_geom\" IS NOT NULL"
