table_name: nhc_advisory_forecast_track
main_dttm_col: null
description: NHC hurricane advisory forecast track lines connecting consecutive forecast points
default_endpoint: null
offset: 0
cache_timeout: null
schema: public
sql: |-
  SELECT
      storm_name,
      nhc_identifier,
      ST_AsGeoJSON(ST_MakeLine("start_geom", "end_geom"))::text AS geom,
      wind_speed_mph,
      max_gust_mph,
      year
  FROM (
      SELECT
          storm_name,
          nhc_identifier,
          ST_GeomFromGeoJSON(forecast_point) AS "start_geom",
          LEAD(ST_GeomFromGeoJSON(forecast_point)) OVER (
              PARTITION BY storm_name ORDER BY nhc_identifier
          ) AS "end_geom",
          wind_speed_mph,
          max_gust_mph,
          year
      FROM nhc_advisory_forecast_track
  ) sub
  WHERE "end_geom" IS NOT NULL
