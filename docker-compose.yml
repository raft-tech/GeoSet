#
# Self-contained GeoSet development environment.
# Includes PostGIS, sample data ingest, and Superset (light mode — no Redis/Celery).
#
# USAGE:
#   docker compose up                # default (Dockerfile, dev target)
#   DOCKERFILE=Dockerfile.rhel docker compose up  # RHEL
#
# ACCESS:
#   Frontend: http://localhost:9001
#
name: geoset

x-superset-user: &superset-user root
x-superset-volumes: &superset-volumes
  - ./docker:/app/docker
  - ./superset:/app/superset
  - ./superset-frontend:/app/superset-frontend
  - superset_home:/app/superset_home
  - ./tests:/app/tests
x-common-build: &common-build
  context: .
  dockerfile: ${DOCKERFILE:-Dockerfile}
  target: dev
  args:
    DEV_MODE: "true"
    INCLUDE_CHROMIUM: ${INCLUDE_CHROMIUM:-false}
    INCLUDE_FIREFOX: ${INCLUDE_FIREFOX:-false}
    BUILD_TRANSLATIONS: ${BUILD_TRANSLATIONS:-false}

services:
  # ---------- GeoSet data layer ----------
  postgis:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: geoset
      POSTGRES_USER: geoset
      POSTGRES_PASSWORD: geoset
    volumes:
      - geoset_data:/var/lib/postgresql/data
      - ./sample-data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoset -d geoset"]
      interval: 5s
      timeout: 5s
      retries: 5

  sample-data-ingest:
    build:
      context: ./sample-data
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      DB_HOST: postgis
      DB_PORT: "5432"
      DB_NAME: geoset
      DB_USER: geoset
      DB_PASSWORD: geoset

  # ---------- Superset metadata database ----------
  db:
    env_file:
      - path: docker/.env
        required: true
      - path: docker/.env-local
        required: false
    image: postgres:16
    restart: unless-stopped
    volumes:
      - db_home:/var/lib/postgresql/data
      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  # ---------- Superset services ----------
  superset-init:
    build:
      <<: *common-build
    command: ["/app/docker/docker-init-geoset.sh"]
    env_file:
      - path: docker/.env
        required: true
      - path: docker/.env-local
        required: false
    depends_on:
      db:
        condition: service_started
      postgis:
        condition: service_healthy
    user: *superset-user
    volumes: *superset-volumes
    environment:
      SUPERSET_CONFIG_PATH: /app/docker/pythonpath_dev/superset_config_docker_light.py
    healthcheck:
      disable: true

  superset:
    env_file:
      - path: docker/.env
        required: true
      - path: docker/.env-local
        required: false
    build:
      <<: *common-build
    command: ["/app/docker/docker-bootstrap.sh", "app"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: *superset-user
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes
    environment:
      SUPERSET_CONFIG_PATH: /app/docker/pythonpath_dev/superset_config_docker_light.py

  superset-node:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
      target: superset-node
      args:
        DEV_MODE: "true"
        BUILD_TRANSLATIONS: ${BUILD_TRANSLATIONS:-false}
    environment:
      BUILD_SUPERSET_FRONTEND_IN_DOCKER: true
      NPM_RUN_PRUNE: false
      SCARF_ANALYTICS: "${SCARF_ANALYTICS:-}"
      superset: "http://superset:8088"
    ports:
      - "127.0.0.1:${NODE_PORT:-9001}:9000"
    command: ["/app/docker/docker-frontend.sh"]
    env_file:
      - path: docker/.env
        required: true
      - path: docker/.env-local
        required: false
    volumes: *superset-volumes

volumes:
  superset_home:
    external: false
  db_home:
    external: false
  geoset_data:
    external: false
