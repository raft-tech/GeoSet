name: Build and Push Docker Image

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: lean
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ebienstock/geoset:${{ github.event.pull_request.head.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-rhel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and Push RHEL
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rhel
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ebienstock/geoset:${{ github.event.pull_request.head.sha }}-rhel
          cache-from: type=gha
          cache-to: type=gha,mode=max

  check-sample-data-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.sample-data }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for sample-data changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sample-data:
              - 'sample-data/**'

  build-and-push-data-ingest:
    runs-on: ubuntu-latest
    needs: check-sample-data-changes
    if: needs.check-sample-data-changes.outputs.changed == 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and Push Data Ingest
        uses: docker/build-push-action@v6
        with:
          context: ./sample-data
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ebienstock/geoset:data-ingest-${{ github.event.pull_request.head.sha }}
            ebienstock/geoset:data-ingest-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
