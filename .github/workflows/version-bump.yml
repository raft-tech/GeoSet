name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # Phase 1: Create version bump PR (runs when a human merges to main)
  bump-version:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh pr list --search "${{ github.sha }}" --state merged --json title,number --jq '.[0]')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title // empty')
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number // empty')
          if [ -z "$PR_TITLE" ]; then
            PR_TITLE=$(git log -1 --pretty=%s)
          fi
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Bump version and update changelog
        id: version
        run: |
          CURRENT_VERSION=$(grep -oP '(?<=\*\*Current Version:\*\* )\S+' VERSIONING.md)
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          sed -i "s/\*\*Current Version:\*\* $CURRENT_VERSION/**Current Version:** $NEW_VERSION/" VERSIONING.md

          PR_TITLE="${{ steps.pr.outputs.title }}"
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          if [ -n "$PR_NUMBER" ]; then
            PR_LINK="[#$PR_NUMBER](https://github.com/${{ github.repository }}/pull/$PR_NUMBER)"
          else
            PR_LINK=""
          fi
          sed -i "/^| Version | PR | Description |/,/^$/{
            /^| ------- | -- |/a\\
          | $NEW_VERSION | $PR_LINK | $PR_TITLE |
          }" VERSIONING.md

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/version-bump-${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add VERSIONING.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.new_version }}" \
            --body "Automated version bump and changelog update." \
            --base main \
            --head "$BRANCH"

  # Phase 2: Tag and build Docker (runs when the bot's version bump PR is merged)
  create-tag:
    runs-on: ubuntu-latest
    if: github.actor == 'github-actions[bot]'
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          NEW_VERSION=$(grep -oP '(?<=\*\*Current Version:\*\* )\S+' VERSIONING.md)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

  docker-debian:
    runs-on: ubuntu-latest
    needs: create-tag

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: lean
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ebienstock/geoset:${{ needs.create-tag.outputs.new_version }}
          build-args: BUILD_VERSION=${{ needs.create-tag.outputs.new_version }}
          cache-from: type=gha,scope=debian
          cache-to: type=gha,mode=max,scope=debian

      - name: Tag as latest
        run: |
          docker buildx imagetools create \
            ebienstock/geoset:${{ needs.create-tag.outputs.new_version }} \
            --tag ebienstock/geoset:latest

  docker-rhel:
    runs-on: ubuntu-latest
    needs: create-tag

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and Push RHEL
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rhel
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ebienstock/geoset:${{ needs.create-tag.outputs.new_version }}-rhel
          build-args: BUILD_VERSION=${{ needs.create-tag.outputs.new_version }}
          cache-from: type=gha,scope=rhel
          cache-to: type=gha,mode=max,scope=rhel

      - name: Tag as latest
        run: |
          docker buildx imagetools create \
            ebienstock/geoset:${{ needs.create-tag.outputs.new_version }}-rhel \
            --tag ebienstock/geoset:latest-rhel

  docker-ingest:
    runs-on: ubuntu-latest
    needs: create-tag

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and Push Data Ingest
        uses: docker/build-push-action@v6
        with:
          context: ./sample-data
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ebienstock/geoset:data-ingest-${{ needs.create-tag.outputs.new_version }}
          cache-from: type=gha,scope=data-ingest
          cache-to: type=gha,mode=max,scope=data-ingest

      - name: Tag as latest
        run: |
          docker buildx imagetools create \
            ebienstock/geoset:data-ingest-${{ needs.create-tag.outputs.new_version }} \
            --tag ebienstock/geoset:data-ingest-latest
