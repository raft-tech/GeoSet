name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR title
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE=$(gh pr list --search "${{ github.sha }}" --state merged --json title --jq '.[0].title')
          if [ -z "$PR_TITLE" ]; then
            PR_TITLE=$(git log -1 --pretty=%s)
          fi
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"

      - name: Bump version and update changelog
        run: |
          CURRENT_VERSION=$(grep -oP '(?<=\*\*Current Version:\*\* )\S+' VERSIONING.md)
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          sed -i "s/\*\*Current Version:\*\* $CURRENT_VERSION/**Current Version:** $NEW_VERSION/" VERSIONING.md

          PR_TITLE="${{ steps.pr.outputs.title }}"
          sed -i "/^| Version | Description |/,/^$/{
            /^|---------/a\\
          | $NEW_VERSION  | $PR_TITLE |
          }" VERSIONING.md

          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSIONING.md
          git commit -m "chore: bump version to $NEW_VERSION"
          git push

      - name: Create tag
        run: |
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
